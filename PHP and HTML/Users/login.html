<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Car Dealer - Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="../../CSS/cus.css">
</head>
<body>

    <nav class="navbar">
        <div class="nav-container">
            <a href="homepage.html" class="nav-logo">🚗 CarDealer</a>
            <ul class="nav-links">
                <li><a href="homepage.html">Home</a></li>
                <li><a href="car-listing.html">Cars</a></li>
                <li><a href="category.html">Categories</a></li>
                <li><a href="contact.html">Contact</a></li>
            </ul>
            <div class="nav-action">
                <a href="login.html" class="btn-primary">Login / Register</a>
            </div>
        </div>
    </nav>

    <div class="container text-center">
        <div class="form-container">
            <h2 style="margin-bottom: 20px;">Welcome Back</h2>
            <form action="profile.html">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" class="form-control" placeholder="Enter your email" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" class="form-control" placeholder="Enter your password" required>
                </div>
                <button type="submit" class="btn-primary" style="width: 100%; margin-top: 10px;">Login</button>
            </form>
            <p style="margin-top: 20px;">Don't have an account? <a href="register.html" style="color: var(--primary-color);">Register here</a></p>
        </div>
    </div>
    <footer class="footer">
        <div class="container text-center">
            <p>&copy; 2024 Car Dealer. All Rights Reserved.</p>
        </div>
    </footer>

</body>
</html>
